function App() {
  const [activePhase, setActivePhase] = useState(0);
  const [activeStep, setActiveStep] = useState(0);

  const phase = phases[activePhase];
  const step = phase.steps[activeStep];

  const goNext = () => {
    if (activeStep < phase.steps.length - 1) setActiveStep(s => s + 1);
    else if (activePhase < phases.length - 1) { setActivePhase(p => p + 1); setActiveStep(0); }
  };

  const goPrev = () => {
    if (activeStep > 0) setActiveStep(s => s - 1);
    else if (activePhase > 0) { const p = activePhase - 1; setActivePhase(p); setActiveStep(phases[p].steps.length - 1); }
  };

  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#0a0a0f", minHeight: "100vh", color: "#e2e8f0", display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ borderBottom: "1px solid #1e293b", padding: "16px 24px", background: "#0f0f1a" }}>
        <div style={{ fontSize: 10, color: "#64748b", letterSpacing: 3, textTransform: "uppercase", marginBottom: 4 }}>Vietnam Experience Video</div>
        <div style={{ fontSize: 20, fontWeight: 700, color: "#f8fafc" }}>Production Workflow <span style={{ color: "#64748b", fontSize: 14, fontWeight: 400 }}>— Han Life Style</span></div>
      </div>

      {/* Phase tabs */}
      <div style={{ display: "flex", gap: 4, padding: "10px 16px", background: "#0f0f1a", borderBottom: "1px solid #1e293b", overflowX: "auto", flexShrink: 0 }}>
        {phases.map((p, i) => (
          <button key={p.id} onClick={() => { setActivePhase(i); setActiveStep(0); }}
            style={{ padding: "7px 13px", borderRadius: 8, border: "none", fontSize: 11, fontWeight: 600, whiteSpace: "nowrap", transition: "all 0.15s", background: activePhase === i ? p.color : "#1e293b", color: activePhase === i ? "#fff" : "#94a3b8" }}>
            {p.emoji} {p.title}
          </button>
        ))}
      </div>

      {/* Main */}
      <div style={{ display: "flex", flex: 1, overflow: "hidden", minHeight: 0 }}>
        {/* Sidebar */}
        <div style={{ width: 210, background: "#0f0f1a", borderRight: "1px solid #1e293b", padding: "14px 10px", display: "flex", flexDirection: "column", gap: 5, overflowY: "auto", flexShrink: 0 }}>
          <div style={{ fontSize: 9, color: "#475569", letterSpacing: 2, textTransform: "uppercase", padding: "0 4px", marginBottom: 4 }}>{phase.subtitle}</div>
          {phase.steps.map((s, i) => (
            <button key={i} onClick={() => setActiveStep(i)}
              style={{ padding: "9px 11px", borderRadius: 8, border: `1px solid ${activeStep === i ? phase.color : "transparent"}`, background: activeStep === i ? phase.color + "22" : "transparent", color: activeStep === i ? "#f8fafc" : "#64748b", textAlign: "left", fontSize: 11, fontWeight: activeStep === i ? 600 : 400, lineHeight: 1.4, transition: "all 0.15s" }}>
              <span style={{ display: "inline-block", background: activeStep === i ? phase.color : "#1e293b", color: "#fff", fontSize: 8, padding: "1px 5px", borderRadius: 4, marginBottom: 3, fontWeight: 700, letterSpacing: 1 }}>{s.tag}</span>
              <div>{s.title}</div>
            </button>
          ))}
        </div>

        {/* Detail */}
        <div style={{ flex: 1, padding: "24px 28px", overflowY: "auto" }}>
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: "inline-block", background: phase.color, color: "#fff", fontSize: 9, padding: "3px 10px", borderRadius: 20, fontWeight: 700, letterSpacing: 1, marginBottom: 10 }}>
              {phase.emoji} {phase.title} — {step.tag}
            </div>
            <h2 style={{ fontSize: 20, fontWeight: 700, color: "#f8fafc", margin: 0 }}>{step.title}</h2>
          </div>

          <div style={{ background: "#111827", border: "1px solid #1e293b", borderRadius: 12, padding: "22px 26px" }}>
            {step.detail.split("\n").map((line, i) => {
              if (line === "") return <div key={i} style={{ height: 8 }} />;
              if (line.startsWith("===")) return (
                <div key={i} style={{ color: phase.color, fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", marginTop: 18, marginBottom: 7, paddingBottom: 5, borderBottom: "1px solid " + phase.color + "44" }}>
                  {line.replace(/===/g, "").trim()}
                </div>
              );
              if (line === "---") return <div key={i} style={{ borderTop: "1px solid #1e293b", margin: "14px 0" }} />;
              const isIndented = line.startsWith("  ") || line.startsWith("   ");
              return (
                <div key={i} style={{ fontSize: isIndented ? 12 : 13, color: isIndented ? "#64748b" : "#cbd5e1", lineHeight: 1.85, fontFamily: isIndented ? "monospace" : "inherit", paddingLeft: isIndented ? 8 : 0 }}>
                  {line}
                </div>
              );
            })}
          </div>

          {/* Nav */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 18 }}>
            <button onClick={goPrev} style={{ padding: "9px 18px", background: "#1e293b", border: "none", borderRadius: 8, color: "#94a3b8", fontSize: 12 }}>← Trước</button>
            <div style={{ color: "#475569", fontSize: 11 }}>Phase {activePhase+1}/{phases.length} · Step {activeStep+1}/{phase.steps.length}</div>
            <button onClick={goNext} style={{ padding: "9px 18px", background: phase.color, border: "none", borderRadius: 8, color: "#fff", fontSize: 12, fontWeight: 600 }}>Tiếp →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

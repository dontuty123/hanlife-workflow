function App() {
  const [activePhase, setActivePhase] = useState(0);
  const [activeStep, setActiveStep] = useState(0);

  const phase = phases[activePhase];
  const step = phase.steps[activeStep];

  const totalSteps = phases.reduce((a,p) => a + p.steps.length, 0);
  const doneSteps = phases.slice(0,activePhase).reduce((a,p) => a + p.steps.length, 0) + activeStep + 1;

  const goNext = () => {
    if (activeStep < phase.steps.length - 1) setActiveStep(s => s+1);
    else if (activePhase < phases.length - 1) { setActivePhase(p => p+1); setActiveStep(0); }
  };
  const goPrev = () => {
    if (activeStep > 0) setActiveStep(s => s-1);
    else if (activePhase > 0) { const p=activePhase-1; setActivePhase(p); setActiveStep(phases[p].steps.length-1); }
  };

  const renderContent = (text) => {
    return text.split("\n").map((line, i) => {
      if (line === "") return React.createElement("div", {key:i, style:{height:8}});
      if (line.startsWith("===")) {
        const label = line.replace(/===/g,"").trim();
        return React.createElement("div", {key:i, style:{
          color:phase.color, fontSize:10, fontWeight:700, letterSpacing:2,
          textTransform:"uppercase", marginTop:18, marginBottom:8,
          paddingBottom:5, borderBottom:"1px solid "+phase.color+"44"
        }}, label);
      }
      if (line === "---") return React.createElement("div", {key:i, style:{borderTop:"1px solid #1e2535", margin:"14px 0"}});
      const isSectionNum = /^\[[0-9A-Z]\]/.test(line);
      const isCode = line.startsWith("    ");
      return React.createElement("div", {key:i, style:{
        fontSize: isSectionNum ? 13 : isCode ? 11.5 : 12.5,
        color: isSectionNum ? "#f1f5f9" : isCode ? "#6b7280" : "#c4cdd6",
        lineHeight: 1.85,
        fontFamily: isCode ? "monospace" : "inherit",
        fontWeight: isSectionNum ? 600 : 400,
        paddingLeft: isCode ? 8 : 0,
        marginTop: isSectionNum ? 6 : 0
      }}, line);
    });
  };

  return React.createElement("div", {style:{display:"flex",flexDirection:"column",height:"100vh",background:"#080810",color:"#e2e8f0"}},
    React.createElement("div", {style:{borderBottom:"1px solid #1e2535",padding:"12px 16px",background:"#0c0c18",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
      React.createElement("div", null,
        React.createElement("div", {style:{fontSize:9,color:"#4b5563",letterSpacing:3,textTransform:"uppercase"}}, "Vietnam Experience Video"),
        React.createElement("div", {style:{fontSize:16,fontWeight:700,color:"#f1f5f9",lineHeight:1.2}},
          "Production Workflow ",
          React.createElement("span", {style:{color:"#374151",fontSize:12,fontWeight:400}}, "Han Life Method")
        )
      ),
      React.createElement("div", {style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("div", {style:{fontSize:10,color:"#4b5563"}}, doneSteps+"/"+totalSteps),
        React.createElement("div", {style:{width:70,height:4,background:"#1e2535",borderRadius:2}},
          React.createElement("div", {style:{width:((doneSteps/totalSteps)*100)+"%",height:"100%",background:phase.color,borderRadius:2,transition:"width 0.3s"}})
        )
      )
    ),
    React.createElement("div", {style:{display:"flex",gap:3,padding:"8px 10px",background:"#0c0c18",borderBottom:"1px solid #1e2535",overflowX:"auto",flexShrink:0}},
      phases.map((p,i) =>
        React.createElement("button", {
          key:p.id,
          onClick:()=>{setActivePhase(i);setActiveStep(0);},
          style:{padding:"5px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,whiteSpace:"nowrap",background:activePhase===i?p.color:"#1a1f2e",color:activePhase===i?"#fff":"#6b7280",transition:"all 0.15s"}
        }, p.icon+" "+p.title)
      )
    ),
    React.createElement("div", {style:{display:"flex",flex:1,overflow:"hidden"}},
      React.createElement("div", {style:{width:185,background:"#0c0c18",borderRight:"1px solid #1e2535",padding:"12px 8px",display:"flex",flexDirection:"column",gap:4,overflowY:"auto",flexShrink:0}},
        React.createElement("div", {style:{fontSize:8,color:"#374151",letterSpacing:2,textTransform:"uppercase",padding:"0 4px",marginBottom:4}}, phase.subtitle),
        phase.steps.map((s,i) =>
          React.createElement("button", {
            key:i,
            onClick:()=>setActiveStep(i),
            style:{padding:"8px 10px",borderRadius:7,border:"1px solid "+(activeStep===i?phase.color:"transparent"),background:activeStep===i?phase.color+"1a":"transparent",color:activeStep===i?"#f1f5f9":"#6b7280",textAlign:"left",fontSize:10.5,fontWeight:activeStep===i?600:400,lineHeight:1.4,transition:"all 0.15s"}
          },
            React.createElement("span", {style:{display:"inline-block",background:activeStep===i?phase.color:"#1e2535",color:"#fff",fontSize:7.5,padding:"1px 5px",borderRadius:3,marginBottom:3,fontWeight:700,letterSpacing:0.8}}, s.tag),
            React.createElement("div", {style:{marginTop:1}}, s.title)
          )
        )
      ),
      React.createElement("div", {style:{flex:1,padding:"20px 24px",overflowY:"auto"}},
        React.createElement("div", {style:{marginBottom:16}},
          React.createElement("div", {style:{display:"inline-flex",alignItems:"center",gap:6,background:phase.color+"22",border:"1px solid "+phase.color+"44",padding:"3px 10px",borderRadius:20,marginBottom:10}},
            React.createElement("span", {style:{fontSize:9,fontWeight:700,color:phase.color,letterSpacing:1,textTransform:"uppercase"}}, phase.icon+" / "+phase.title+" / "+step.tag)
          ),
          React.createElement("h2", {style:{fontSize:18,fontWeight:700,color:"#f1f5f9",margin:0,lineHeight:1.3}}, step.title)
        ),
        React.createElement("div", {style:{background:"#0f1117",border:"1px solid #1e2535",borderRadius:10,padding:"20px 22px",marginBottom:16}},
          renderContent(step.detail)
        ),
        React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          React.createElement("button", {
            onClick:goPrev,
            disabled:activePhase===0&&activeStep===0,
            style:{padding:"8px 16px",background:"#1a1f2e",border:"none",borderRadius:7,color:"#6b7280",fontSize:11,opacity:activePhase===0&&activeStep===0?0.3:1}
          }, "< Back"),
          React.createElement("div", {style:{color:"#374151",fontSize:10,textAlign:"center"}},
            React.createElement("div", null, phase.icon+" "+phase.subtitle),
            React.createElement("div", {style:{color:phase.color,marginTop:2}}, (activeStep+1)+" / "+phase.steps.length)
          ),
          React.createElement("button", {
            onClick:goNext,
            disabled:activePhase===phases.length-1&&activeStep===phase.steps.length-1,
            style:{padding:"8px 16px",background:phase.color,border:"none",borderRadius:7,color:"#fff",fontSize:11,fontWeight:600,opacity:activePhase===phases.length-1&&activeStep===phase.steps.length-1?0.3:1}
          }, "Next >")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>

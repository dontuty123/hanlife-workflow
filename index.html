        title:"Cấu trúc Script 5 Layer", tag:"STRUCTURE",
        detail:`MỖI SCRIPT CÓ 5 LỚP -- không phải chỉ lời thoại

LAYER 1 -- NARRATIVE ARC
Mỗi video phải có: Setup -> Tension -> Insight -> Resolution
KHÔNG PHẢI: Sáng -> Trưa -> Tối (chỉ là timeline, không phải arc)

Ví dụ arc tốt:
Setup:      "Hôm nay tôi có $5"
Tension:    Budget giảm dần, người xem lo theo
Insight:    Contrast moment -> câu nói về khoảng cách giàu nghèo
Resolution: "This is not a problem to be solved. It is just life."

LAYER 2 -- EMOTIONAL TEMPERATURE
Không để cảm xúc flat suốt 17 phút.
Map ra: calm -> curious -> sad -> humor -> reflective -> hopeful

LAYER 3 -- INFORMATION DENSITY
Xen kẽ: cảnh đầy thông tin (budget breakdown, giá tiền)
với cảnh thở (đi bộ, ngồi im, nhìn xung quanh)
Rule: Sau mỗi 2-3 phút dense -> 30-60 giây breathing room

LAYER 4 -- UNIVERSAL BRIDGES
Ít nhất 3 lần trong video: từ cụ thể -> universal
"This banh mi costs $1."
--> "For a lot of people here,
    this is not a snack. It is a meal."
Đây là lúc người xem ở bất kỳ đâu cũng gật đầu.

LAYER 5 -- SILENCE & PAUSE
Im lặng 1-2 giây sau câu quan trọng = cảm xúc landing.
Đây là kỹ thuật Han dùng nhiều nhất
mà ít người để ý.`

function App() {
  const [activePhase, setActivePhase] = useState(0);
  const [activeStep, setActiveStep] = useState(0);

  const phase = phases[activePhase];
  const step = phase.steps[activeStep];

  const totalSteps = phases.reduce((a,p) => a + p.steps.length, 0);
  const doneSteps = phases.slice(0,activePhase).reduce((a,p) => a + p.steps.length, 0) + activeStep + 1;

  const goNext = () => {
    if (activeStep < phase.steps.length - 1) setActiveStep(s => s+1);
    else if (activePhase < phases.length - 1) { setActivePhase(p => p+1); setActiveStep(0); }
  };
  const goPrev = () => {
    if (activeStep > 0) setActiveStep(s => s-1);
    else if (activePhase > 0) { const p=activePhase-1; setActivePhase(p); setActiveStep(phases[p].steps.length-1); }
  };

  const renderContent = (text) => {
    return text.split("\n").map((line, i) => {
      if (line === "") return React.createElement("div", {key:i, style:{height:8}});
      if (line.startsWith("===")) {
        const label = line.replace(/===/g,"").trim();
        return React.createElement("div", {key:i, style:{
          color:phase.color, fontSize:10, fontWeight:700, letterSpacing:2,
          textTransform:"uppercase", marginTop:18, marginBottom:8,
          paddingBottom:5, borderBottom:"1px solid "+phase.color+"44"
        }}, label);
      }
      if (line === "---") return React.createElement("div", {key:i, style:{borderTop:"1px solid #1e2535", margin:"14px 0"}});
      const isSectionNum = /^\[[0-9A-Z]\]/.test(line);
      const isCode = line.startsWith("    ");
      return React.createElement("div", {key:i, style:{
        fontSize: isSectionNum ? 13 : isCode ? 11.5 : 12.5,
        color: isSectionNum ? "#f1f5f9" : isCode ? "#6b7280" : "#c4cdd6",
        lineHeight: 1.85,
        fontFamily: isCode ? "monospace" : "inherit",
        fontWeight: isSectionNum ? 600 : 400,
        paddingLeft: isCode ? 8 : 0,
        marginTop: isSectionNum ? 6 : 0
      }}, line);
    });
  };

  return React.createElement("div", {style:{display:"flex",flexDirection:"column",height:"100vh",background:"#080810",color:"#e2e8f0"}},
    React.createElement("div", {style:{borderBottom:"1px solid #1e2535",padding:"12px 16px",background:"#0c0c18",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
      React.createElement("div", null,

        )
      ),
      React.createElement("div", {style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("div", {style:{fontSize:10,color:"#4b5563"}}, doneSteps+"/"+totalSteps),
        React.createElement("div", {style:{width:70,height:4,background:"#1e2535",borderRadius:2}},
          React.createElement("div", {style:{width:((doneSteps/totalSteps)*100)+"%",height:"100%",background:phase.color,borderRadius:2,transition:"width 0.3s"}})
        )
      )
    ),
    React.createElement("div", {style:{display:"flex",gap:3,padding:"8px 10px",background:"#0c0c18",borderBottom:"1px solid #1e2535",overflowX:"auto",flexShrink:0}},
      phases.map((p,i) =>
        React.createElement("button", {
          key:p.id,
          onClick:()=>{setActivePhase(i);setActiveStep(0);},

            style:{padding:"8px 10px",borderRadius:7,border:"1px solid "+(activeStep===i?phase.color:"transparent"),background:activeStep===i?phase.color+"1a":"transparent",color:activeStep===i?"#f1f5f9":"#6b7280",textAlign:"left",fontSize:10.5,fontWeight:activeStep===i?600:400,lineHeight:1.4,transition:"all 0.15s"}
